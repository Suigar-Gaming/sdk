name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - CHANGELOG.md
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.release.outputs.should_publish }}
      package_name: ${{ steps.metadata.outputs.package_name }}
      current_version: ${{ steps.metadata.outputs.current_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Detect release commit
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only HEAD^ HEAD)"

          if grep -qx 'package.json' <<< "$changed_files" && grep -qx 'CHANGELOG.md' <<< "$changed_files"; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_publish=false" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        if: steps.release.outputs.should_publish == 'true'
        run: npm install

      - name: Build package
        if: steps.release.outputs.should_publish == 'true'
        run: npm run build:ci

      - name: Check package contents
        if: steps.release.outputs.should_publish == 'true'
        run: npm pack --dry-run

      - name: Read package metadata
        if: steps.release.outputs.should_publish == 'true'
        id: metadata
        shell: bash
        run: |
          echo "package_name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "current_version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.release.outputs.should_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ''
        run: npm run release

      - name: Skip publish
        if: steps.release.outputs.should_publish != 'true'
        run: echo "No release changes detected; skipping npm publish."

  deprecate:
    needs: publish
    if: needs.publish.result == 'success' && needs.publish.outputs.should_publish == 'true'
    uses: ./.github/workflows/deprecate-previous-npm.yml
    secrets:
      npm_deprecate_token: ${{ secrets.NPM_DEPRECATE_TOKEN }}
    with:
      package_name: ${{ needs.publish.outputs.package_name }}
      current_version: ${{ needs.publish.outputs.current_version }}
