name: Deprecate Previous NPM Release

on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string
      current_version:
        required: true
        type: string
    secrets:
      npm_deprecate_token:
        required: false

permissions:
  contents: read

jobs:
  deprecate:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Deprecate previous release
        shell: bash
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          CURRENT_VERSION: ${{ inputs.current_version }}
          NODE_AUTH_TOKEN: ${{ secrets.npm_deprecate_token }}
        run: |
          set -uo pipefail

          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_DEPRECATE_TOKEN is not configured; skipping deprecation."
            exit 0
          fi

          PREVIOUS_VERSION="$(node <<'NODE'
          const { execFileSync } = require('node:child_process');

          function parseVersion(version) {
            const match = version.match(/^(\d+)\.(\d+)\.(\d+)(?:-([0-9A-Za-z.-]+))?$/);
            if (!match) {
              return null;
            }

            const [, major, minor, patch, prereleaseRaw] = match;
            const prerelease = prereleaseRaw
              ? prereleaseRaw.split('.').map((part) => (/^\d+$/.test(part) ? Number(part) : part))
              : [];

            return {
              raw: version,
              major: Number(major),
              minor: Number(minor),
              patch: Number(patch),
              prerelease,
            };
          }

          function compareIdentifiers(left, right) {
            const leftNumeric = typeof left === 'number';
            const rightNumeric = typeof right === 'number';

            if (leftNumeric && rightNumeric) {
              return left - right;
            }

            if (leftNumeric) {
              return -1;
            }

            if (rightNumeric) {
              return 1;
            }

            return left.localeCompare(right);
          }

          function compareVersions(left, right) {
            for (const key of ['major', 'minor', 'patch']) {
              if (left[key] !== right[key]) {
                return left[key] - right[key];
              }
            }

            const leftPre = left.prerelease;
            const rightPre = right.prerelease;

            if (leftPre.length === 0 && rightPre.length === 0) {
              return 0;
            }

            if (leftPre.length === 0) {
              return 1;
            }

            if (rightPre.length === 0) {
              return -1;
            }

            const length = Math.max(leftPre.length, rightPre.length);
            for (let index = 0; index < length; index += 1) {
              if (index >= leftPre.length) {
                return -1;
              }

              if (index >= rightPre.length) {
                return 1;
              }

              const diff = compareIdentifiers(leftPre[index], rightPre[index]);
              if (diff !== 0) {
                return diff;
              }
            }

            return 0;
          }

          const current = parseVersion(process.env.CURRENT_VERSION);
          if (!current) {
            process.exit(0);
          }

          let versions = [];
          try {
            const output = execFileSync(
              'npm',
              ['view', process.env.PACKAGE_NAME, 'versions', '--json'],
              { encoding: 'utf8' }
            ).trim();
            const parsed = JSON.parse(output);
            versions = Array.isArray(parsed) ? parsed : [parsed];
          } catch {
            process.exit(0);
          }

          const parsedVersions = versions
            .map(parseVersion)
            .filter(Boolean)
            .filter((version) => compareVersions(version, current) < 0);

          const sameCoreCandidates = parsedVersions.filter(
            (version) =>
              version.major === current.major &&
              version.minor === current.minor &&
              version.patch === current.patch
          );

          const fallbackCandidates = parsedVersions.filter((version) => version.prerelease.length === 0);
          const candidates = sameCoreCandidates.length > 0 ? sameCoreCandidates : fallbackCandidates;

          if (candidates.length === 0) {
            process.exit(0);
          }

          candidates.sort(compareVersions);
          process.stdout.write(candidates[candidates.length - 1].raw);
          NODE
          )"

          if [ -z "$PREVIOUS_VERSION" ]; then
            echo "No previous release candidate for ${CURRENT_VERSION}; skipping deprecation."
            exit 0
          fi

          if npm view "${PACKAGE_NAME}@${PREVIOUS_VERSION}" version >/dev/null 2>&1; then
            if npm deprecate "${PACKAGE_NAME}@${PREVIOUS_VERSION}" "Deprecated in favor of ${PACKAGE_NAME}@${CURRENT_VERSION}"; then
              echo "Deprecated ${PACKAGE_NAME}@${PREVIOUS_VERSION}."
            else
              echo "Deprecation failed for ${PACKAGE_NAME}@${PREVIOUS_VERSION}; continuing without failing publish."
            fi
          else
            echo "Version ${PACKAGE_NAME}@${PREVIOUS_VERSION} not found on npm; skipping deprecation."
          fi
