name: Deprecate Previous NPM Release

on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string
      current_version:
        required: true
        type: string
    secrets:
      npm_deprecate_token:
        required: false

permissions:
  contents: read

jobs:
  deprecate:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Deprecate previous release
        shell: bash
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          CURRENT_VERSION: ${{ inputs.current_version }}
          NODE_AUTH_TOKEN: ${{ secrets.npm_deprecate_token }}
        run: |
          set -uo pipefail

          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_DEPRECATE_TOKEN is not configured; skipping deprecation."
            exit 0
          fi

          PREVIOUS_VERSION="$(node <<'NODE'
          const match = process.env.CURRENT_VERSION.match(/^(\d+)\.(\d+)\.(\d+)(?:-([0-9A-Za-z.-]+))?$/);
          if (!match) {
            process.exit(0);
          }

          const [, major, minor, patch, prerelease] = match;
          if (prerelease) {
            process.exit(0);
          }

          const previousPatch = Number(patch) - 1;
          if (previousPatch < 0) {
            process.exit(0);
          }

          process.stdout.write(`${major}.${minor}.${previousPatch}`);
          NODE
          )"

          if [ -z "$PREVIOUS_VERSION" ]; then
            echo "No previous release candidate for ${CURRENT_VERSION}; skipping deprecation."
            exit 0
          fi

          if npm view "${PACKAGE_NAME}@${PREVIOUS_VERSION}" version >/dev/null 2>&1; then
            if npm deprecate "${PACKAGE_NAME}@${PREVIOUS_VERSION}" "Deprecated in favor of ${PACKAGE_NAME}@${CURRENT_VERSION}"; then
              echo "Deprecated ${PACKAGE_NAME}@${PREVIOUS_VERSION}."
            else
              echo "Deprecation failed for ${PACKAGE_NAME}@${PREVIOUS_VERSION}; continuing without failing publish."
            fi
          else
            echo "Version ${PACKAGE_NAME}@${PREVIOUS_VERSION} not found on npm; skipping deprecation."
          fi
